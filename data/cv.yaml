      institution: Indian Institute of Technology Bombay
      year: "Oct 2024 – Present"
      description:
        - "Thesis: Self-Supervised Multimodal Representation Learning for Earth Observation"
        - My research focuses on developing self-supervised learning frameworks for large-scale Earth observation data, leveraging satellite imagery across multiple modalities (SAR, optical, hyperspectral) to learn rich geospatial representations without labeled annotations. I explore both masked reconstruction (MAE) and latent prediction (JEPA) paradigms to advance foundation model development for Earth observation.

